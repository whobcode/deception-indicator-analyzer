name: Deploy to Cloudflare

# Reconstructed Worker repo. Gated on CLOUDFLARE_API_TOKEN: runs green and
# no-ops until the secret exists, then deploys via wrangler.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Check for deploy secret
        id: gate
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then echo "enabled=true" >> "$GITHUB_OUTPUT";
          else echo "enabled=false" >> "$GITHUB_OUTPUT"; echo "::notice::CLOUDFLARE_API_TOKEN not set - skipping."; fi
      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if [ -f package-lock.json ]; then npm ci --legacy-peer-deps || npm install --legacy-peer-deps;
          elif [ -f package.json ]; then npm install --legacy-peer-deps; else echo "no package.json"; fi
      - name: Deploy to Cloudflare (with retry)
        if: steps.gate.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for attempt in 1 2 3; do
            echo "::group::Deploy attempt $attempt"
            if npx --yes wrangler@latest deploy; then echo "::endgroup::"; echo "ok $attempt"; exit 0; fi
            echo "::endgroup::"; echo "retry in 15s"; sleep 15
          done
          echo "All deploy attempts failed"; exit 1
